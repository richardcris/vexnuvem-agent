name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $toolsDir = Join-Path $PWD '.tools'
          $installerFile = Join-Path $toolsDir 'innosetup-6.7.1.exe'
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null
          Invoke-WebRequest -Uri 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_1/innosetup-6.7.1.exe' -OutFile $installerFile
          Start-Process -FilePath $installerFile -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/CURRENTUSER' -Wait

      - name: Compute Build Version
        id: meta
        shell: pwsh
        run: |
          $script = @'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          base = str(data["project"]["version"])
          parts = base.split(".")
          major = parts[0] if len(parts) > 0 else "1"
          minor = parts[1] if len(parts) > 1 else "0"
          version = f"{major}.{minor}.{os.environ['GITHUB_RUN_NUMBER']}"
          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag=v{version}\n")
              fh.write(f"installer=VexNuvem-Agent-Setup-{version}.exe\n")
          '@
          python -c $script

      - name: Build Installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_installer.ps1 `
            -Python 'python' `
            -BuildVersion '${{ steps.meta.outputs.version }}' `
            -GitHubRepository '${{ github.repository }}' `
            -OutputBaseFilename 'VexNuvem-Agent-Setup-${{ steps.meta.outputs.version }}'

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vexnuvem-installer
          path: dist/installer/${{ steps.meta.outputs.installer }}

      - name: Prepare Release Notes
        id: release_notes
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $repository = '${{ github.repository }}'
          $currentTag = '${{ steps.meta.outputs.tag }}'
          $currentVersion = '${{ steps.meta.outputs.version }}'
          $template = Get-Content '.github/release-notes.md' -Raw

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = 'application/vnd.github+json'
            'User-Agent' = 'github-actions'
          }

          $previousTag = ''
          try {
            $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repository/releases?per_page=1" -Method Get
            if ($releases -is [array] -and $releases.Count -gt 0) {
              $previousTag = [string]$releases[0].tag_name
            }
            elseif ($releases.tag_name) {
              $previousTag = [string]$releases.tag_name
            }
          }
          catch {
            Write-Host 'Nao foi possivel consultar a release anterior. Sera usado um link de commits para esta versao.'
          }

          if ($previousTag) {
            $compareUrl = "https://github.com/$repository/compare/$previousTag...$currentTag"
          }
          else {
            $compareUrl = "https://github.com/$repository/commits/$currentTag"
          }

          $body = $template.Replace('{{VERSION}}', $currentVersion)
          $body = $body.Replace('{{TAG}}', $currentTag)
          $body = $body.Replace('{{REPOSITORY}}', $repository)
          $body = $body.Replace('{{COMPARE_URL}}', $compareUrl)

          $delimiter = [guid]::NewGuid().ToString()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: VexNuvem Agent ${{ steps.meta.outputs.version }}
          body: ${{ steps.release_notes.outputs.body }}
          files: dist/installer/${{ steps.meta.outputs.installer }}